<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="h1"></h1>
    <p id="p1"></p>
    <p id="p2"></p> 
    <p id="p3"></p>
        
    <script>
        var word = "What's your name?"; 
        document.getElementById("p1").innerHTML = word.toLowerCase()
        document.getElementById("p2").innerHTML = word.toUpperCase()
        document.getElementById("p3").innerHTML = word.startsWith("Ax")
        ;
        for(var i=1; i<=22; i++){
            document.write(i + "<br>") ;
        }
    </script>
</body>
</html>
